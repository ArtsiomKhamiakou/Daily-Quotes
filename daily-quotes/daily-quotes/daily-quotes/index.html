<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>📖 Daily Quotes</h1>
        <div class="quote-box">
            <p id="quote-text">Загрузка...</p>
            <p id="quote-author">— Автор</p>
        </div>
        <div class="buttons">
            <button id="new-btn">🎲 Новая цитата</button>
            <button id="favorite-btn">⭐ Сохранить</button>
             <button id="share-btn">📤 Поделиться</button>
        </div>
        <h2>⭐ Любимые цитаты</h2>
        <div id="favorites-list"></div>
    </div>
    <script src="quotes.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
